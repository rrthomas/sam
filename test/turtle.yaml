- pen_x: float 0.0
- pen_y: float 0.0
- pen_theta: float 0.0
- pen_color: int 0
- pen_drawing: int 0
-
  - init: trap WHITE
  - trap CLEARSCREEN
  - float 0.0
  - !istack pen_x
  - set
  - float 0.0
  - !istack pen_y
  - set
  - float 0.0
  - !istack pen_theta
  - set
  - trap BLACK
  - !istack pen_color
  - set
  - int 0
  - !istack pen_drawing
  - set
-
  - penup: int 0
  - !istack pen_drawing
  - set
-
  - pendown: int 1
  - !istack pen_drawing
  - set
  - !istack pen_x
  - get
  - trap F2I
  - !istack pen_y
  - get
  - trap F2I
  - !istack pen_color
  - get
  - trap SETDOT
-
  - turn: !istack pen_theta
  - get
  - int -4
  - trap s0
  - get
  - neg
  - add
  - !istack pen_theta
  - set
-
  - go: !istack pen_theta
  - get
  - trap cos
  - int -4
  - trap s0
  - get
  - mul
  - !istack pen_x
  - get
  - add
  - !istack pen_theta
  - get
  - trap sin
  - int -5
  - trap s0
  - get
  - mul
  - !istack pen_y
  - get
  - add
  - !istack pen_drawing
  - get
  -
    - !istack pen_x
    - get
    - trap F2I
    - !istack pen_y
    - get
    - trap F2I
    - int -6
    - trap s0
    - get
    - trap F2I
    - int -6
    - trap s0
    - get
    - trap F2I
    - !istack pen_color
    - get
    - trap DRAWLINE
  - []
  - if
  - !istack pen_y
  - set
  - !istack pen_x
  - set
