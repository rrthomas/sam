# Copy a stack's only reference
- new
- trap copy
# Append an item, then prepend an item to the new stack, then copy the stack
- int 13
- int -2
- s0
- get
- append
- int 42
- int -2
- s0
- get
- prepend
- int -1
- s0
- get
- trap copy
# Pop an item from one of the copies
- int -1
- s0
- get
- pop
# Shift an item from the same copy
- int -2
- s0
- get
- shift
# Pop an item from the current stack using pop (no effect!)
- s0
- pop
# Exit 
- int 0
- halt
