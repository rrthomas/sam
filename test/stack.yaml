# Copy a blob's only reference
- trap new
- trap copy
# Append an item, then prepend an item to the new blob, then copy the blob
- int 13
- int -2
- get
- append
- int 42
- int -2
- get
- trap prepend
- int -1
- get
- trap copy
# Pop an item from one of the copies
- int -1
- get
- pop
# Shift an item from the same copy
- int -2
- get
- trap shift
# Pop an item from the current blob using pop (no effect!)
- trap s0
- pop
# Exit 
- int 0
- halt
