# Copy a blob's only reference
- trap new_map
- trap copy
# Insert two items, then copy the blob
- int 13
- float 1.0
- int -3
- trap s0
- get
- set
- int 42
- float 2.0
- int -3
- trap s0
- get
- set
- int -1
- trap s0
- get
- trap copy
# Remove an item from one of the copies
- null
- float 1.0
- int -3
- trap s0
- get
- set
# Replace an item in the same copy
- int 28
- float 2.0
- int -3
- trap s0
- get
- set
# Iterate over the map, getting and discarding its values
- int -1
- trap s0
- get
- trap iter
-
  - loop: int -3
  - trap s0
  - get
  - trap next
  - null
  - eq
  - not
  - while
  - blob loop
  - go
- do
# Exit 
- int 0
- halt
