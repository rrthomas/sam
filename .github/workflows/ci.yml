name: CI

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      ASAN_FLAGS: "-fsanitize=address -fsanitize=undefined"

    steps:
      - uses: actions/checkout@v5
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
      - name: Install dependencies
        run: |
          brew install coreutils automake pkg-config go sdl2_mixer libgrapheme
          # Prepend optional brew binary directories to PATH
          echo "$(brew --prefix m4)/bin:${PATH}" >> $GITHUB_PATH
      - name: configure
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix systemd)/lib/pkgconfig:$PKG_CONFIG_PATH"
          autoreconf -fi && ./configure && go mod download
      - name: make
        run: make --jobs=`nproc`
        env:
          CFLAGS: -g ${{ env.ASAN_FLAGS }}
          CXXFLAGS: -g ${{ env.ASAN_FLAGS }}
          LDFLAGS: ${{ env.ASAN_FLAGS }}
      - name: make check
        run: |
          export LD_LIBRARY_PATH=$(brew --prefix)/lib
          go run . --debug test/iter.sal
          make check --jobs=`nproc` || ( cat test/test-suite.log && exit 1 )
      - name: make distcheck
        # normal build is with ASAN, distcheck is without ASAN. Both are covered.
        run: |
          export LD_LIBRARY_PATH=$(brew --prefix)/lib
          make distcheck --jobs=`nproc` || ( cat sam-*/_build/sub/test/test-suite.log && exit 1 )

